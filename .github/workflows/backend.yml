name: backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "build-logic/**"
      - "gradle/**"
      - "settings.gradle.kts"
      - "build.gradle.kts"
      - "gradlew"
      - "gradlew.bat"
      - ".github/workflows/backend.yml"
  pull_request:
    paths:
      - "backend/**"
      - "build-logic/**"
      - "gradle/**"
      - "settings.gradle.kts"
      - "build.gradle.kts"
      - "gradlew"
      - "gradlew.bat"
      - ".github/workflows/backend.yml"

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle

      - name: Run backend tests
        run: ./gradlew :backend:test --no-daemon
